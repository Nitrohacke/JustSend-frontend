  <!-- Email Screen -->
  <div class="screen" id="phone-screen">
    <div class="screen-content">
      <h2>Enter your email</h2>
      <p>We'll send you a verification code</p>
      <div class="input-group">
        <span class="flag">✉️</span>
        <input type="email" id="phone-input" placeholder="you@gmail.com" />
      </div>
      <button class="btn-primary" onclick="sendOTP()">Send OTP</button>
      <p class="error-msg" id="phone-error"></p>
    </div>
  </div>
